services:
  - type: web
    name: coreacta-doe
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: coreacta-doe-db
          property: connectionString

databases:
  - name: coreacta-doe-db
    plan: free
    databaseName: coreacta
    user: coreacta
